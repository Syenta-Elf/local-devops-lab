---
# tasks file for roles/nginx
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install nginx
  apt:
    name: nginx
    state: present
- name: Create and Configure /etc/nginx/conf.d/default.conf
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/default.conf
  notify:
    - "Restart service nginx, in all cases"
- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: yes
  notify:
    - "Restart service nginx, in all cases"
